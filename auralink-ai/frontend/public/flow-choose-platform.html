<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Choose marketplace | SyncLyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], serif: ['Source Serif 4', 'Georgia', 'serif'] },
        },
      },
    };
  </script>
  <style>
    .platform-card {
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .platform-card:hover {
      border-color: #a1a1aa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .platform-card:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-5 pt-6 pb-4 shrink-0">
      <a href="#" id="back-link" class="text-zinc-600 hover:text-zinc-900 no-underline text-sm font-medium flex items-center gap-1" onclick="event.preventDefault(); history.back();">
        <span aria-hidden="true">←</span>
        <span>Back</span>
      </a>
      <span class="w-10 h-10" aria-hidden="true"></span>
    </header>

    <main class="flex-1 px-5 pb-6 overflow-auto">
      <h1 class="font-serif text-xl font-bold text-zinc-900 mb-2 text-center">Where do you want to list?</h1>
      <p class="text-center text-sm text-zinc-600 mb-8">Choose one marketplace. You’ll go through that platform’s flow and layout.</p>

      <div class="grid grid-cols-2 gap-4" id="platform-cards">
        <!-- Etsy -->
        <button type="button" class="platform-card rounded-xl bg-white border-2 border-zinc-200 p-5 flex flex-col items-center justify-center gap-3 cursor-pointer text-left min-h-[140px]" data-platform="etsy" data-flow="flow-3-etsy.html">
          <span class="w-14 h-14 rounded-xl bg-orange-50 border border-orange-200 flex items-center justify-center overflow-hidden shrink-0">
            <img src="https://www.google.com/s2/favicons?domain=etsy.com&sz=128" alt="" class="w-8 h-8 object-contain" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-orange-600 text-xl font-bold\'>E</span>';" />
          </span>
          <span class="font-semibold text-zinc-900">Etsy</span>
        </button>
        <!-- eBay -->
        <button type="button" class="platform-card rounded-xl bg-white border-2 border-zinc-200 p-5 flex flex-col items-center justify-center gap-3 cursor-pointer text-left min-h-[140px]" data-platform="ebay" data-flow="flow-3-ebay.html">
          <span class="w-14 h-14 rounded-xl bg-blue-50 border border-blue-200 flex items-center justify-center overflow-hidden shrink-0">
            <img src="/assets/ebay-logo.png" alt="eBay" class="w-8 h-8 object-contain" />
          </span>
          <span class="font-semibold text-zinc-900">eBay</span>
        </button>
        <!-- TikTok Shop -->
        <button type="button" class="platform-card rounded-xl bg-white border-2 border-zinc-200 p-5 flex flex-col items-center justify-center gap-3 cursor-pointer text-left min-h-[140px]" data-platform="tiktok_shop" data-flow="flow-3-tiktok.html">
          <span class="w-14 h-14 rounded-xl bg-zinc-100 border border-zinc-200 flex items-center justify-center overflow-hidden shrink-0">
            <img src="https://www.google.com/s2/favicons?domain=tiktok.com&sz=128" alt="" class="w-8 h-8 object-contain" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-zinc-600 text-xl font-bold\'>T</span>';" />
          </span>
          <span class="font-semibold text-zinc-900">TikTok Shop</span>
        </button>
        <!-- Shopify -->
        <button type="button" class="platform-card rounded-xl bg-white border-2 border-zinc-200 p-5 flex flex-col items-center justify-center gap-3 cursor-pointer text-left min-h-[140px]" data-platform="shopify" data-flow="flow-3.html">
          <span class="w-14 h-14 rounded-xl bg-green-50 border border-green-200 flex items-center justify-center overflow-hidden shrink-0">
            <img src="https://www.google.com/s2/favicons?domain=shopify.com&sz=128" alt="" class="w-8 h-8 object-contain" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-green-600 text-xl font-bold\'>S</span>';" />
          </span>
          <span class="font-semibold text-zinc-900">Shopify</span>
        </button>
      </div>
    </main>
  </div>
  <script>
    (function() {
      var STORAGE_KEY = 'synclyst_selected_platform';
      var PENDING_SCAN_KEY = 'auralink_pending_scan';
      var DRAFT_LISTING_KEY = 'auralink_draft_listing';

      function hasScanData() {
        try {
          var raw = sessionStorage.getItem(PENDING_SCAN_KEY);
          if (raw) {
            var o = JSON.parse(raw);
            if (o && o.base64) return true;
          }
          raw = sessionStorage.getItem(DRAFT_LISTING_KEY);
          if (raw) {
            var o = JSON.parse(raw);
            if (o && o.extraction) return true;
          }
        } catch (e) {}
        return false;
      }

      document.getElementById('platform-cards').addEventListener('click', function(e) {
        var btn = e.target.closest('button[data-platform][data-flow]');
        if (!btn) return;
        var platform = btn.getAttribute('data-platform');
        var flow = btn.getAttribute('data-flow');
        try {
          sessionStorage.setItem(STORAGE_KEY, platform);
        } catch (err) {}
        // If we have scan data (came from scan page), go to processing (flow-2) then to platform flow
        if (hasScanData()) {
          window.location.href = '/flow-2.html';
        } else {
          window.location.href = '/' + flow;
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key !== 'ArrowLeft') return;
        if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement && document.activeElement.tagName || '')) return;
        e.preventDefault();
        history.back();
      });
    })();
  </script>
</body>
</html>
