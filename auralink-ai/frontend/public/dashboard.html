<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="view-transition" content="same-origin" />
  <title>Dashboard – SyncLyst AI</title>
  <link rel="stylesheet" href="/css/synclyst-flow.css" />
  <link rel="stylesheet" href="/css/flow-page-transition.css" />
  <script src="/js/flow-page-transition.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .dash-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      min-height: 100vh;
    }
    .dash-card {
      max-width: 24rem;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }
    .dash-card h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .dash-card p {
      color: var(--syn-muted);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }
    .dash-card .dash-btn {
      margin-top: 1.5rem;
      width: 100%;
      text-decoration: none;
    }
    .dash-links {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--syn-muted);
    }
    .dash-links a {
      color: var(--syn-muted);
      font-weight: 500;
      text-decoration: none;
    }
    .dash-links a:hover {
      color: var(--syn-text);
      text-decoration: underline;
    }
    .dash-links a + a {
      margin-left: 0.75rem;
    }
  </style>
</head>
<body class="synclyst-flow-body">
  <div class="dash-wrap" data-synclyst-page-transition-root>
    <div class="synclyst-card dash-card">
      <h1>SyncLyst Dashboard</h1>
      <p>Use the button below to open the dashboard.</p>
      <a href="/dashboard" class="synclyst-btn-primary dash-btn">Open Dashboard</a>
      <div class="dash-links">
        <a href="/landing.html">Home</a>
        <a href="/landing.html">Landing page</a>
      </div>
    </div>
  </div>
</body>
</html>
